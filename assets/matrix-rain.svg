<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="160" viewBox="0 0 1200 160" role="img" aria-labelledby="title desc">
  <title id="title">Animated Matrix code rain</title>
  <desc id="desc">Neon green binary characters falling over a dark terminal background.</desc>
  <defs>
    <linearGradient id="edge-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#020805" stop-opacity=".95"/>
      <stop offset=".18" stop-color="#020805" stop-opacity="0"/>
      <stop offset=".82" stop-color="#020805" stop-opacity="0"/>
      <stop offset="1" stop-color="#020805" stop-opacity=".95"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#123c25" stroke-width="1" opacity=".35"/>
    </pattern>
    <filter id="green-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .rain { font: 15px monospace; font-weight: 700; fill: #39ff14; filter: url(#green-glow); }
      .rain-dim { font: 13px monospace; fill: #0f9b48; opacity: .75; }
      .trace { font: 11px monospace; letter-spacing: 2px; fill: #8dffad; opacity: .7; }
    </style>
  </defs>

  <rect width="1200" height="160" rx="14" fill="#020805"/>
  <rect width="1200" height="160" rx="14" fill="url(#grid)"/>

  <g class="rain">
    <g><text x="36" y="0">1</text><text x="36" y="23">0</text><text x="36" y="46">1</text><text x="36" y="69">0</text><text x="36" y="92">1</text><text x="36" y="115">0</text><text x="36" y="138">1</text><text x="36" y="161">0</text><animateTransform attributeName="transform" type="translate" from="0 -175" to="0 210" dur="6.8s" begin="-1.2s" repeatCount="indefinite"/></g>
    <g><text x="112" y="0">0</text><text x="112" y="23">1</text><text x="112" y="46">0</text><text x="112" y="69">1</text><text x="112" y="92">0</text><text x="112" y="115">1</text><text x="112" y="138">0</text><text x="112" y="161">1</text><text x="112" y="184">0</text><animateTransform attributeName="transform" type="translate" from="0 -230" to="0 220" dur="8.4s" begin="-4.6s" repeatCount="indefinite"/></g>
    <g><text x="188" y="0">1</text><text x="188" y="23">1</text><text x="188" y="46">0</text><text x="188" y="69">0</text><text x="188" y="92">1</text><text x="188" y="115">0</text><text x="188" y="138">1</text><animateTransform attributeName="transform" type="translate" from="0 -160" to="0 210" dur="7.3s" begin="-2.8s" repeatCount="indefinite"/></g>
    <g><text x="267" y="0">0</text><text x="267" y="23">1</text><text x="267" y="46">1</text><text x="267" y="69">0</text><text x="267" y="92">0</text><text x="267" y="115">1</text><text x="267" y="138">0</text><text x="267" y="161">1</text><text x="267" y="184">1</text><text x="267" y="207">0</text><animateTransform attributeName="transform" type="translate" from="0 -270" to="0 220" dur="9.2s" begin="-6.1s" repeatCount="indefinite"/></g>
    <g><text x="350" y="0">1</text><text x="350" y="23">0</text><text x="350" y="46">1</text><text x="350" y="69">1</text><text x="350" y="92">0</text><text x="350" y="115">1</text><text x="350" y="138">0</text><text x="350" y="161">0</text><animateTransform attributeName="transform" type="translate" from="0 -190" to="0 215" dur="7.7s" begin="-3.4s" repeatCount="indefinite"/></g>
    <g><text x="432" y="0">0</text><text x="432" y="23">0</text><text x="432" y="46">1</text><text x="432" y="69">0</text><text x="432" y="92">1</text><text x="432" y="115">1</text><text x="432" y="138">0</text><text x="432" y="161">1</text><text x="432" y="184">0</text><text x="432" y="207">1</text><animateTransform attributeName="transform" type="translate" from="0 -320" to="0 220" dur="10s" begin="-7.3s" repeatCount="indefinite"/></g>
    <g><text x="518" y="0">1</text><text x="518" y="23">0</text><text x="518" y="46">0</text><text x="518" y="69">1</text><text x="518" y="92">1</text><text x="518" y="115">0</text><text x="518" y="138">1</text><animateTransform attributeName="transform" type="translate" from="0 -155" to="0 210" dur="6.2s" begin="-2.2s" repeatCount="indefinite"/></g>
    <g><text x="603" y="0">0</text><text x="603" y="23">1</text><text x="603" y="46">0</text><text x="603" y="69">1</text><text x="603" y="92">1</text><text x="603" y="115">0</text><text x="603" y="138">0</text><text x="603" y="161">1</text><text x="603" y="184">0</text><animateTransform attributeName="transform" type="translate" from="0 -245" to="0 220" dur="8.9s" begin="-5.2s" repeatCount="indefinite"/></g>
    <g><text x="692" y="0">1</text><text x="692" y="23">1</text><text x="692" y="46">0</text><text x="692" y="69">1</text><text x="692" y="92">0</text><text x="692" y="115">0</text><text x="692" y="138">1</text><animateTransform attributeName="transform" type="translate" from="0 -175" to="0 215" dur="7.1s" begin="-1.9s" repeatCount="indefinite"/></g>
    <g><text x="780" y="0">0</text><text x="780" y="23">1</text><text x="780" y="46">1</text><text x="780" y="69">0</text><text x="780" y="92">1</text><text x="780" y="115">0</text><text x="780" y="138">1</text><text x="780" y="161">1</text><text x="780" y="184">0</text><text x="780" y="207">0</text><animateTransform attributeName="transform" type="translate" from="0 -295" to="0 220" dur="9.6s" begin="-6.7s" repeatCount="indefinite"/></g>
    <g><text x="866" y="0">1</text><text x="866" y="23">0</text><text x="866" y="46">1</text><text x="866" y="69">0</text><text x="866" y="92">0</text><text x="866" y="115">1</text><text x="866" y="138">1</text><animateTransform attributeName="transform" type="translate" from="0 -135" to="0 210" dur="6.5s" begin="-3.7s" repeatCount="indefinite"/></g>
    <g><text x="950" y="0">0</text><text x="950" y="23">1</text><text x="950" y="46">0</text><text x="950" y="69">1</text><text x="950" y="92">1</text><text x="950" y="115">0</text><text x="950" y="138">1</text><text x="950" y="161">0</text><text x="950" y="184">1</text><animateTransform attributeName="transform" type="translate" from="0 -255" to="0 220" dur="8.1s" begin="-5.9s" repeatCount="indefinite"/></g>
    <g><text x="1037" y="0">1</text><text x="1037" y="23">1</text><text x="1037" y="46">0</text><text x="1037" y="69">0</text><text x="1037" y="92">1</text><text x="1037" y="115">0</text><text x="1037" y="138">1</text><text x="1037" y="161">1</text><animateTransform attributeName="transform" type="translate" from="0 -185" to="0 215" dur="7.6s" begin="-2.9s" repeatCount="indefinite"/></g>
    <g><text x="1124" y="0">0</text><text x="1124" y="23">1</text><text x="1124" y="46">1</text><text x="1124" y="69">0</text><text x="1124" y="92">0</text><text x="1124" y="115">1</text><text x="1124" y="138">0</text><text x="1124" y="161">1</text><text x="1124" y="184">1</text><text x="1124" y="207">0</text><animateTransform attributeName="transform" type="translate" from="0 -305" to="0 220" dur="10.4s" begin="-8.1s" repeatCount="indefinite"/></g>
  </g>

  <g class="rain-dim" opacity=".55">
    <text x="18" y="28">$ scan --surface</text>
    <text x="18" y="147">010101 // 010101 // 010101 // 010101</text>
    <text x="912" y="28">TRACE: ACTIVE</text>
    <text x="942" y="147">root@lab:~$ _</text>
  </g>
  <rect width="1200" height="160" rx="14" fill="url(#edge-fade)"/>
  <text x="600" y="82" text-anchor="middle" class="trace">0101 // SECURITY TRACE // 0101</text>
</svg>
